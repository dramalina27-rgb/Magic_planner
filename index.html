<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Волшебный дневник</title>
<link rel="icon" href="images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============ ДИЗАЙН-СИСТЕМА (раздел 2) ============ */
:root{
  --accent:#8A6FBF; --accent-dark:#4A356E;
  --bg:#FBF7FF; --card:#FFFFFF;
  --bg-g1:#F3EAFF; --bg-g2:#FFE9F4; --bg-g3:#EDE7FF;
  --pink:#F2A7C3; --ok:#5CB85C; --part:#F0AD4E; --fail:#D9534F; --cancel:#5B9BD5;
  --coin:#F5C244; --disabled:#C9C2D6;
  --shadow:0 4px 16px rgba(74,53,110,.12);
  --r-btn:14px; --r-card:12px;
}
body[data-theme="peach"]{ --accent:#E8926F; --accent-dark:#8A4A2E; --bg-g1:#FFEFE4; --bg-g2:#FFE5EE; --bg-g3:#FFF3E0; }
body[data-theme="mint"]{ --accent:#5FB89A; --accent-dark:#2E6E58; --bg-g1:#E4F7EE; --bg-g2:#EAF9F0; --bg-g3:#FDEFF6; }
body[data-theme="sky"]{ --accent:#6F9BE8; --accent-dark:#2E4A8A; --bg-g1:#E7F0FF; --bg-g2:#F2EAFF; --bg-g3:#FFEDF6; }

*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Nunito',sans-serif; font-size:16px; line-height:1.5;
  background:
    radial-gradient(1100px 620px at 8% -6%, var(--bg-g1) 0%, transparent 62%),
    radial-gradient(1000px 640px at 100% 14%, var(--bg-g2) 0%, transparent 60%),
    radial-gradient(900px 700px at 44% 108%, var(--bg-g3) 0%, transparent 62%),
    var(--bg);
  background-attachment:fixed;
  color:#3A2F52;
  transition:background .3s;
}
h1,h2,h3,h4{font-family:'Comfortaa',cursive; color:var(--accent-dark); line-height:1.3;}
.caveat{font-family:'Caveat',cursive; font-size:24px;}
a{color:var(--accent);}
button{font-family:'Nunito',sans-serif; cursor:pointer;}
img{display:block; max-width:100%;}
input,textarea,select{
  font-family:'Nunito',sans-serif; font-size:15px; padding:9px 12px;
  border:2px solid #E4DCF2; border-radius:10px; background:#fff; color:#3A2F52;
  outline:none; transition:border-color .2s;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent);}
textarea{resize:vertical; min-height:90px; width:100%;}
::placeholder{color:#B7ADCB;}

/* ---- Кнопки ---- */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  border:none; border-radius:var(--r-btn); padding:11px 22px;
  font-weight:700; font-size:15px; color:#fff; background:var(--accent);
  transition:transform .2s, box-shadow .2s, background .2s; text-decoration:none;
}
.btn:hover:not(:disabled){background:var(--accent-dark); transform:translateY(-1px); box-shadow:var(--shadow);}
.btn:active:not(:disabled){transform:translateY(0);}
.btn.secondary{background:transparent; color:var(--accent); border:2px solid var(--accent);}
.btn.secondary:hover:not(:disabled){background:var(--accent); color:#fff;}
.btn.danger{background:var(--fail);}
.btn.danger:hover:not(:disabled){background:#b23c37;}
.btn.big{font-size:19px; padding:15px 40px;}
.btn.small{padding:6px 14px; font-size:13px; border-radius:10px;}
.btn:disabled{background:var(--disabled); color:#fff; cursor:not-allowed; border-color:var(--disabled); transform:none; box-shadow:none;}
.btn.secondary:disabled{background:transparent; color:var(--disabled);}
.iconbtn{
  background:none; border:none; padding:6px; border-radius:10px; color:var(--accent);
  display:inline-flex; align-items:center; transition:background .2s,color .2s;
}
.iconbtn:hover{background:rgba(138,111,191,.12); color:var(--accent-dark);}

/* ---- Карточки ---- */
.card{background:var(--card); border-radius:var(--r-card); box-shadow:var(--shadow); padding:18px;}
.item-card{
  position:relative; background:var(--card); border-radius:12px; box-shadow:0 2px 8px rgba(74,53,110,.08);
  padding:10px 12px 10px 18px; margin-bottom:8px; display:flex; align-items:center; gap:10px;
  overflow:hidden; transition:box-shadow .2s;
}
.item-card::before{content:''; position:absolute; left:0; top:0; bottom:0; width:6px; background:var(--sphere-color,var(--accent));}
.item-card:hover{box-shadow:var(--shadow);}
.item-card .title{flex:1; font-weight:600; min-width:0; overflow-wrap:anywhere;}
.item-card .time-badge{font-family:'Comfortaa'; font-weight:700; color:var(--accent-dark); font-size:14px; white-space:nowrap;}
.item-card .thumb{width:44px; height:44px; border-radius:8px; object-fit:cover; cursor:pointer; flex-shrink:0;}
.goal-flag{font-size:14px;}
.dim .item-card{opacity:.72;}

/* ---- Модалки ---- */
.modal-overlay{
  position:fixed; inset:0; background:rgba(30,20,50,.55); z-index:1000;
  display:flex; align-items:center; justify-content:center; padding:18px;
  animation:fadeIn .2s;
}
.modal{
  background:#fff; border-radius:18px; box-shadow:0 12px 40px rgba(30,20,50,.35);
  max-width:640px; width:100%; max-height:90vh; overflow:auto; position:relative; padding:26px;
  animation:popIn .25s;
}
.modal.wide{max-width:820px;}
.modal.narrow{max-width:430px;}
.modal-close{
  position:absolute; top:12px; right:12px; background:none; border:none; color:#9C8FB8;
  padding:6px; border-radius:8px; z-index:5;
}
.modal-close:hover{color:var(--accent-dark); background:#F1EBFA;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0; transform:scale(.94) translateY(10px)}to{opacity:1; transform:none}}

/* ---- Тосты ---- */
#toast-stack{position:fixed; top:18px; right:18px; z-index:2000; display:flex; flex-direction:column; gap:10px; max-width:340px;}
.toast{
  background:#fff; border-left:5px solid var(--accent); border-radius:12px; box-shadow:var(--shadow);
  padding:12px 16px; font-size:14px; font-weight:600; display:flex; align-items:center; gap:10px;
  animation:toastIn .3s;
}
.toast .ach-mini{width:34px; height:34px; flex-shrink:0;}
@keyframes toastIn{from{opacity:0; transform:translateX(40px)}to{opacity:1; transform:none}}
.toast.out{opacity:0; transform:translateX(40px); transition:all .3s;}

/* ---- Хинты ---- */
.hint-pop{
  position:fixed; z-index:3000; background:#4A356E; color:#fff; font-size:13px; line-height:1.4;
  padding:8px 12px; border-radius:10px; max-width:260px; box-shadow:0 6px 20px rgba(30,20,50,.3);
  animation:fadeIn .15s; pointer-events:none;
}
[data-hint]{position:relative;}

/* ---- Заглушка отсутствующей картинки ---- */
.img-ph{
  display:flex; align-items:center; justify-content:center; text-align:center;
  background:linear-gradient(135deg,#CDB9EE 0%, #F2A7C3 100%);
  color:#fff; font-family:'Comfortaa'; font-weight:700; font-size:13px;
  border-radius:inherit; width:100%; height:100%; padding:8px; word-break:break-all;
}

/* ---- Шапка приложения ---- */
#topbar{
  position:sticky; top:0; z-index:500; background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
  box-shadow:0 2px 12px rgba(74,53,110,.10);
  display:flex; align-items:center; gap:4px; padding:8px 16px; flex-wrap:wrap;
}
#topbar .tabs{display:flex; gap:2px; flex-wrap:wrap;}
.tab-link{
  border:none; background:none; font-family:'Comfortaa'; font-weight:700; font-size:15px;
  color:var(--accent-dark); padding:9px 15px; border-radius:12px; transition:all .2s;
}
.tab-link:hover{background:rgba(138,111,191,.12);}
.tab-link.active{background:var(--accent); color:#fff; box-shadow:0 3px 10px rgba(138,111,191,.4);}
#topbar .spacer{flex:1;}
#coin-counter{
  display:inline-flex; align-items:center; gap:6px; font-family:'Comfortaa'; font-weight:700;
  font-size:17px; color:#8A6A15; background:#FFF6DC; border-radius:20px; padding:5px 14px 5px 8px;
  cursor:pointer; position:relative; border:none; transition:transform .2s;
}
#coin-counter.bump{animation:coinBump .45s;}
@keyframes coinBump{30%{transform:scale(1.18)}}
.coin-float{
  position:absolute; left:50%; top:-6px; transform:translateX(-50%);
  font-weight:800; font-size:15px; pointer-events:none; animation:floatUp 1.2s forwards;
}
.coin-float.plus{color:var(--ok);} .coin-float.minus{color:var(--fail);}
@keyframes floatUp{to{transform:translate(-50%,-34px); opacity:0}}
#profile-chip{display:inline-flex; align-items:center; gap:4px; font-weight:700; color:var(--accent-dark);}

/* ---- Начальная страница ---- */
#landing{min-height:100vh; display:flex; flex-direction:column;}
.hero{position:relative; width:100%; aspect-ratio:16/6.2; min-height:300px; max-height:520px; overflow:hidden;}
.hero img,.hero .img-ph{width:100%; height:100%; object-fit:cover; border-radius:0;}
.hero-overlay{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; padding:24px; background:linear-gradient(rgba(50,30,80,.25),rgba(50,30,80,.45));
}
.hero-overlay h1{color:#fff; font-size:40px; text-shadow:0 3px 16px rgba(40,20,70,.6); max-width:800px;}
.hero-overlay p{color:#F4EDFF; font-size:19px; margin-top:12px; text-shadow:0 2px 8px rgba(40,20,70,.6); max-width:640px;}
.landing-body{flex:1; display:flex; flex-direction:column; align-items:center; gap:22px; padding:34px 20px 26px;}
.social-row{display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}
.landing-footer{padding:14px; text-align:center;}
.admin-link{background:none; border:none; color:#B0A4C9; font-size:13px; text-decoration:underline;}
.admin-link:hover{color:var(--accent-dark);}

/* ---- Визард (тест-настройка) ---- */
.quiz-wrap{display:flex; gap:22px; align-items:flex-start;}
.quiz-fairy{width:180px; height:180px; border-radius:16px; overflow:hidden; flex-shrink:0;}
.quiz-main{flex:1; min-width:0;}
.quiz-dots{display:flex; gap:8px; margin-bottom:16px;}
.quiz-dots span{width:10px; height:10px; border-radius:50%; background:#E0D6F0; transition:all .25s;}
.quiz-dots span.on{background:var(--accent); transform:scale(1.25);}
.theme-circle{width:52px; height:52px; border-radius:50%; border:3px solid transparent; cursor:pointer; transition:all .2s;}
.theme-circle.sel{border-color:var(--accent-dark); transform:scale(1.12); box-shadow:var(--shadow);}
.choice-btn{
  display:block; width:100%; text-align:left; background:#F6F1FD; border:2px solid transparent;
  border-radius:12px; padding:12px 16px; font-size:15px; font-weight:600; margin-bottom:9px; transition:all .2s;
}
.choice-btn:hover{border-color:var(--accent);}
.choice-btn.sel{border-color:var(--accent); background:#EFE7FB;}

/* ---- Вкладка «День» ---- */
#day-banner{position:relative; width:100%; aspect-ratio:1600/240; min-height:110px; border-radius:16px; overflow:hidden; margin-bottom:18px;}
#day-banner img,#day-banner .img-ph{width:100%; height:100%; object-fit:cover;}
#day-banner .banner-caption{
  position:absolute; left:24px; bottom:14px; font-family:'Comfortaa'; font-weight:700; font-size:24px; color:#fff;
  text-shadow:0 2px 10px rgba(40,20,70,.7);
}
.day-layout{display:grid; grid-template-columns:1fr 1fr 280px; gap:16px; align-items:start;}
.day-block{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:16px;}
.day-block h3{font-size:16px; margin-bottom:12px; display:flex; align-items:center; gap:8px;}
.day-block h3 .count{font-family:'Nunito'; font-size:13px; color:#A395C2; font-weight:700;}
.day-block.setup-mode{outline:2px dashed var(--accent); outline-offset:3px;}
.day-block.hl{box-shadow:0 0 0 3px var(--pink), var(--shadow);}
.full-row{grid-column:1 / span 2;}
.day-col{display:flex; flex-direction:column; gap:16px; min-width:0;}
.day-side{grid-column:3;}
.add-item-btn{
  width:100%; border:2px dashed var(--accent); background:none; color:var(--accent); font-weight:700;
  border-radius:12px; padding:9px; margin-top:4px; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:6px;
}
.add-item-btn:hover:not(:disabled){background:rgba(138,111,191,.1);}
.add-item-btn:disabled{border-color:var(--disabled); color:var(--disabled); cursor:not-allowed;}
.marks{display:flex; gap:6px; flex-shrink:0;}
.mark-btn{
  width:28px; height:28px; border-radius:50%; border:none; display:inline-flex; align-items:center; justify-content:center;
  color:#fff; transition:transform .15s, box-shadow .15s; padding:0;
}
.mark-btn.sel{box-shadow:0 0 0 2.5px #fff, 0 0 0 5px var(--accent-dark); transform:scale(1.12);}
.mark-done{background:var(--ok);} .mark-part{background:var(--part);} .mark-fail{background:var(--fail);} .mark-cancel{background:var(--cancel);}
.legend{font-size:13.5px;}
.legend .row{display:flex; align-items:center; gap:8px; margin-bottom:7px;}
.legend .dot{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;}
.day-done-badge{
  display:inline-flex; align-items:center; gap:6px; background:#E7F6E7; color:#2E7D32;
  font-weight:800; border-radius:20px; padding:5px 14px; font-size:14px;
}
/* мини-календарь */
.mini-cal{user-select:none;}
.mini-cal .cal-head{display:flex; align-items:center; justify-content:center; font-family:'Comfortaa'; font-weight:700; margin-bottom:8px; color:var(--accent-dark);}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center;}
.cal-grid .dow{font-size:11.5px; font-weight:800; color:#A395C2; padding:3px 0;}
.cal-day{
  position:relative; border:none; background:none; border-radius:9px; padding:6px 0 10px; font-size:13.5px;
  font-weight:700; color:#4A356E; transition:background .15s;
}
.cal-day:hover{background:#F1EBFA;}
.cal-day.other{color:#CFC6E0;}
.cal-day.today{box-shadow:inset 0 0 0 2px var(--accent);}
.cal-day.open{background:var(--accent); color:#fff;}
.cal-day .mark-dot{position:absolute; left:50%; bottom:3px; transform:translateX(-50%); width:6px; height:6px; border-radius:50%;}
.cal-nav{display:flex; justify-content:center; gap:18px; margin-top:6px;}
.cal-nav button{border:none;background:none;color:var(--accent);font-size:20px;font-weight:800;padding:0 10px;border-radius:8px;}
.cal-nav button:hover{background:#F1EBFA;}
.side-btns{display:flex; flex-direction:column; gap:9px; margin-top:14px;}
.side-btns .btn{width:100%;}
.note-count{font-size:12.5px; color:#A395C2; text-align:right; margin-top:4px;}

/* ---- Сферы ---- */
.spheres-layout{display:grid; grid-template-columns:250px minmax(0,1fr) 280px; grid-template-rows:auto 1fr; gap:16px; align-items:start;}
.sph-head{grid-column:1 / 3; grid-row:1;}
.sph-left{grid-column:1; grid-row:2;}
#sph-panel{grid-column:2; grid-row:2;}
.spheres-layout .side-illu{grid-column:3; grid-row:1 / 3;}
.sphere-list-item{
  display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:none; background:var(--card);
  border-radius:12px; padding:11px 14px; margin-bottom:7px; font-weight:700; font-size:15px; color:#3A2F52;
  box-shadow:0 2px 8px rgba(74,53,110,.07); transition:all .2s; overflow-wrap:anywhere;
}
.sphere-list-item:hover{box-shadow:var(--shadow);}
.sphere-list-item.sel{outline:2px solid var(--accent);}
.sphere-list-item .sw{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.habit-stats{background:#F6F1FD; border-radius:10px; padding:12px; margin-top:8px; font-size:14px;}
.tracker30{display:grid; grid-template-columns:repeat(15,1fr); gap:3px; margin-top:8px;}
.tracker30 span{aspect-ratio:1; border-radius:4px;}
.tr-done{background:var(--ok);} .tr-fail{background:var(--fail);} .tr-none{background:#E4DCF2;}

/* ---- Цели ---- */
.goal-card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); margin-bottom:14px; overflow:hidden;}
.goal-head{display:flex; align-items:center; gap:12px; padding:15px 18px; cursor:pointer; flex-wrap:wrap;}
.goal-head:hover{background:#FBF8FF;}
.status-badge{font-size:12px; font-weight:800; border-radius:20px; padding:3px 11px; color:#fff; white-space:nowrap;}
.st-created{background:#9C8FB8;} .st-active{background:var(--accent);} .st-frozen{background:#7FB6D9;}
.st-cancelled{background:#B0A4C9;} .st-expired{background:var(--part);} .st-done{background:var(--ok);}
.progress-wrap{position:relative; display:block; flex-basis:180px; flex-grow:1; height:14px; background:#EFE9F8; border-radius:10px; overflow:hidden;}
.progress-bar{display:block; height:100%; border-radius:10px; background:linear-gradient(90deg,var(--accent),var(--pink)); transition:width .5s;}
.progress-label{font-size:12.5px; font-weight:800; color:var(--accent-dark); margin-left:8px;}
.goal-body{padding:0 18px 18px; border-top:1.5px solid #F0EAF9;}
.sphere-tag{font-size:12px; font-weight:800; color:#fff; border-radius:20px; padding:2px 10px; white-space:nowrap;}

/* ---- Дневник ---- */
.diary-stage{position:relative; border-radius:18px; overflow:hidden; min-height:560px; box-shadow:var(--shadow);}
.diary-bgimg{position:absolute; inset:0;}
.diary-bgimg img,.diary-bgimg .img-ph{width:100%;height:100%;object-fit:cover;border-radius:0;}
.diary-pages{position:relative; display:grid; grid-template-columns:1fr 1fr; gap:44px; padding:36px 42px; min-height:560px;}
.diary-spine{position:absolute; top:16px; bottom:16px; left:50%; width:3px; transform:translateX(-50%); background:linear-gradient(rgba(74,53,110,.0),rgba(74,53,110,.25),rgba(74,53,110,.0));}
.diary-entry{
  background:rgba(255,255,255,.88); border-radius:12px; padding:13px 15px; margin-bottom:13px;
  box-shadow:0 2px 10px rgba(74,53,110,.13); position:relative;
}
.diary-entry .phrase{font-family:'Caveat'; font-size:25px; color:var(--accent-dark); line-height:1.15;}
.diary-entry .d-date{font-size:12px; font-weight:800; color:#A395C2; letter-spacing:.4px;}
.diary-entry .freetext{font-family:'Caveat'; font-size:22px; line-height:1.3; white-space:pre-wrap;}
.diary-del{position:absolute; top:8px; right:8px;}
.diary-nav{display:flex; justify-content:center; align-items:center; gap:20px; margin-top:14px; font-weight:800; color:var(--accent-dark);}

/* ---- Награды ---- */
.subtabs{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
.subtab{border:2px solid var(--accent); background:none; color:var(--accent); font-family:'Comfortaa'; font-weight:700; border-radius:20px; padding:8px 20px; transition:all .2s;}
.subtab.active,.subtab:hover{background:var(--accent); color:#fff;}
/* достижения */
.ach-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
.ach-cell{background:var(--card); border-radius:14px; box-shadow:var(--shadow); padding:14px; display:flex; gap:14px; align-items:center;}
.ach-icon{width:86px; height:86px; flex-shrink:0; position:relative; cursor:pointer;}
.ach-icon svg{width:100%; height:100%;}
.ach-icon.locked svg{filter:grayscale(1) opacity(.55);}
.ach-icon.locked::after{
  content:''; position:absolute; inset:0; background:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%234A356E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity=".8"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>') center/34% no-repeat;
}
.ach-icon.earned{filter:drop-shadow(0 0 7px rgba(245,194,68,.65));}
.ach-name{font-weight:800; font-size:14.5px; color:var(--accent-dark);}
/* персонаж */
.char-layout{display:grid; grid-template-columns:minmax(240px,340px) 1fr; gap:20px; align-items:start;}
.char-figure{aspect-ratio:600/900; border-radius:16px; overflow:hidden; box-shadow:var(--shadow);}
.char-figure img,.char-figure .img-ph{width:100%;height:100%;object-fit:cover;}
.costume-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(128px,1fr)); gap:12px;}
.costume-cell{background:var(--card); border-radius:12px; box-shadow:0 2px 8px rgba(74,53,110,.08); padding:8px; text-align:center; cursor:pointer; border:3px solid transparent; transition:all .2s; position:relative;}
.costume-cell:hover{box-shadow:var(--shadow);}
.costume-cell.sel{border-color:var(--accent);}
.costume-cell.owned-active{border-color:var(--ok);}
.costume-cell .c-img{aspect-ratio:240/320; border-radius:8px; overflow:hidden; margin-bottom:6px;}
.costume-cell .c-img img,.costume-cell .c-img .img-ph{width:100%;height:100%;object-fit:cover;}
.costume-cell.locked .c-img{filter:grayscale(.9) opacity(.72);}

function loadDB(){
  try{ DB = JSON.parse(localStorage.getItem(LS_KEY)) || {profiles:[]}; }
  catch(e){ DB = {profiles:[]}; }
  if(!Array.isArray(DB.profiles)) DB.profiles = [];
  migrateDefaultImgs();
}
/* Профили, созданные ранними версиями, могли потерять картинки дефолтных дел/привычек —
   аккуратно возвращаем их по совпадению названий (пользовательские картинки не трогаем) */
function migrateDefaultImgs(){
  const imgByName = {};
  DEFAULT_SPHERES.forEach(s=>[...s.tasks, ...s.habits].forEach(it=>{ if(it.img) imgByName[it.name.toLowerCase()] = it.img; }));
  let changed = false;
  const fix = it => { const im = imgByName[(it.name||'').toLowerCase()]; if(im && !it.img && !(it.imgs && it.imgs.length)){ it.img = im; changed = true; } };
  DB.profiles.forEach(p=>{
    (p.spheres||[]).forEach(s=>{ (s.tasks||[]).forEach(fix); (s.habits||[]).forEach(fix); });
    (p.archive||[]).forEach(s=>{ (s.tasks||[]).forEach(fix); (s.habits||[]).forEach(fix); });
    Object.values(p.days||{}).forEach(d=>{
      if(d.completed) return; // завершённые дни не трогаем
      [...(d.schedule||[]), ...(d.tasks||[]), ...(d.habits||[])].forEach(fix);
    });
  });
  if(changed){ try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){} }
}
function saveDB(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }
  catch(e){ toast(STRINGS.storageFull); }
}

function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseYmd(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function todayYmd(){ return ymd(new Date()); }
function fmtDateRu(s){ const d=parseYmd(s); return d.getDate()+' '+MONTHS_RU[d.getMonth()]+' '+d.getFullYear(); }
function fmtDT(ts){ if(!ts) return '—'; const d=new Date(ts);

function plural(n, one, few, many){ n=Math.abs(n)%100; const n1=n%10;
  if(n>10&&n<20) return many; if(n1>1&&n1<5) return few; if(n1===1) return one; return many; }

/* Пароль аккаунта: храним только хеш (SHA-256 с солью; на очень старых
   браузерах — упрощённый фолбэк). Пароль переезжает вместе с экспортом данных. */
async function hashPass(pass, salt){
  const data = salt + '::' + pass;
  try{
    if(crypto && crypto.subtle){
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
      return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
    }
  }catch(e){}
  let h1 = 0x811c9dc5, h2 = 0x01000193;
  for(const ch of data){ const cd = ch.codePointAt(0); h1 = ((h1 ^ cd) * 16777619) >>> 0; h2 = ((h2 + cd) * 31 + 7) >>> 0; }
  return 'f' + h1.toString(16) + h2.toString(16);
}
async function setProfilePass(p, pass){
  if(!pass){ p.passHash = null; p.passSalt = null; }
  else { p.passSalt = uid(); p.passHash = await hashPass(pass, p.passSalt); }
  saveDB();
}
async function checkProfilePass(p, pass){
  if(!p.passHash) return true;
  return (await hashPass(pass, p.passSalt)) === p.passHash;
}
/* окно ввода пароля при входе в защищённый профиль */
function askProfilePass(p){
  return new Promise(res=>{
    let done = false;
    const m = openModal(`<h3 class="mb">🔒 Профиль защищён паролем</h3>
      <div class="field"><label>Пароль для «${esc(p.name)}»</label><input id="pp-pass" type="password" maxlength="40"></div>
      <p id="pp-err" style="color:var(--fail);font-weight:700;font-size:13.5px;display:none">Неверный пароль</p>
      <div style="text-align:right"><button class="btn" id="pp-ok">Войти</button></div>`,
      {onClose:()=>{ if(!done){ done = true; res(false); } }});
    const inp = m.root.querySelector('#pp-pass');
    inp.focus();
    const submit = async ()=>{
      if(await checkProfilePass(p, inp.value)){ done = true; m.close(); res(true); }
      else { m.root.querySelector('#pp-err').style.display = ''; inp.select(); }
    };
    m.root.querySelector('#pp-ok').onclick = submit;
    inp.onkeydown = e=>{ if(e.key==='Enter') submit(); };
  });
}

}

/* конфетти */
function confetti(){
  const cv = document.getElementById('confetti-canvas');
  cv.width = innerWidth; cv.height = innerHeight;
  const ctx = cv.getContext('2d');
  const cols = ['#8A6FBF','#F2A7C3','#F5C244','#5CB85C','#6F9BE8','#CE93D8'];
  const parts = Array.from({length:120}, ()=>({
    x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.4,
    vy:2+Math.random()*3.5, vx:(Math.random()-0.5)*2.4, r:4+Math.random()*5,
    c:cols[Math.floor(Math.random()*cols.length)], a:Math.random()*Math.PI, va:(Math.random()-0.5)*0.25, star:Math.random()<0.35
  }));
  let frames = 0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.a+=p.va;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.a); ctx.fillStyle=p.c;
      if(p.star){ ctx.beginPath(); for(let i=0;i<5;i++){ const A=i*2*Math.PI/5-Math.PI/2;
        ctx.lineTo(Math.cos(A)*p.r, Math.sin(A)*p.r); const B=A+Math.PI/5;
        ctx.lineTo(Math.cos(B)*p.r*0.45, Math.sin(B)*p.r*0.45);} ctx.closePath(); ctx.fill(); }
      else ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.65);
      ctx.restore();
    });
    if(++frames < 150) requestAnimationFrame(tick); else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* сжатие пользовательской картинки до dataURL ≤300 КБ */
function compressImage(file){
  return new Promise((res, rej)=>{
    const rd = new FileReader();
    rd.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        let w = img.width, h = img.height;
        const maxSide = 900;
        if(Math.max(w,h) > maxSide){ const k = maxSide/Math.max(w,h); w=Math.round(w*k); h=Math.round(h*k); }
        const cv = document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        let q = 0.85, out = cv.toDataURL('image/jpeg', q);
        while(out.length > 300*1024 && q > 0.3){ q -= 0.12; out = cv.toDataURL('image/jpeg', q); }
        if(out.length > 300*1024) rej(new Error('too big')); else res(out);
      };
      img.onerror = rej; img.src = rd.result;
    };
    rd.onerror = rej; rd.readAsDataURL(file);
  });
}
/* ================= СТАТИСТИКА ПРИВЫЧЕК И СЕРИЙ ================= */
function habitDayRecords(habitId){
  // все даты, где привычка стояла в плане: {date, done:bool|null}
  const recs = [];
  for(const date in P.days){
    const d = P.days[date];
    (d.habits||[]).forEach(h=>{
      if(h.habitId === habitId) recs.push({date, mark:h.mark, completed:d.completed});
    });
  }
  recs.sort((a,b)=>a.date<b.date?-1:1);
  return recs;
}
function habitStats(habitId){
  const recs = habitDayRecords(habitId);
  const today = todayYmd();
  let total = 0;
  recs.forEach(r=>{ if(r.mark==='done') total++; });
  // максимальная цепочка по календарным датам: done продолжает, fail/пропуск планирования — обрывает
  const doneSet = new Set(recs.filter(r=>r.mark==='done').map(r=>r.date));
  let maxAll = 0, maxLast30 = 0;
  if(doneSet.size){
    const dates = [...doneSet].sort();
    const first = parseYmd(dates[0]), last = parseYmd(dates[dates.length-1]);
    let cur = 0; const d30 = new Date(); d30.setDate(d30.getDate()-29);
    for(let d = new Date(first); d <= last; d.setDate(d.getDate()+1)){
      const k = ymd(d);
      cur = doneSet.has(k) ? cur+1 : 0;
      maxAll = Math.max(maxAll, cur);
      if(k >= ymd(d30)) maxLast30 = Math.max(maxLast30, cur);
    }
  }
  return {total, maxAll, maxLast30, recs};
}
function habitTracker30(habitId){
  const map = {};
  const recs = habitDayRecords(habitId);
  recs.forEach(r=>{ map[r.date] = r.mark; });
  const today = todayYmd();
  // окно начинается с ПЕРВОГО дня, когда привычка стояла в плане (отметки идут с первой ячейки),
  // но не раньше, чем 29 дней назад — показываем максимум последние 30 дней
  const d29 = new Date(); d29.setDate(d29.getDate()-29);
  const firstRec = recs.length ? recs.map(r=>r.date).sort()[0] : today;
  const startKey = firstRec > ymd(d29) ? firstRec : ymd(d29);
  const start = parseYmd(startKey);
  const cells = [];
  for(let i=0;i<30;i++){
    const d = new Date(start); d.setDate(d.getDate()+i); const k = ymd(d);
    if(k > today){ cells.push(`<span class="tr-none" style="opacity:.45"></span>`); continue; }
    const m = map[k];
    cells.push(`<span class="${m==='done'?'tr-done': m==='fail'?'tr-fail':'tr-none'}" title="${fmtDateRu(k)}"></span>`);
  }
  return `<div class="tracker30">${cells.join('')}</div>`;
}

/* ================= ДВИЖОК ДОСТИЖЕНИЙ ================= */
function completedDates(){ return Object.keys(P.days).filter(d=>P.days[d].completed).sort(); }
function isPerfectDay(day){
  const all = [...(day.schedule||[]), ...(day.tasks||[]), ...(day.habits||[])];
  if(!all.length) return false;
  return all.every(it => it.mark==='done' || it.mark==='cancel');
}
function maxConsecutive(dates, pred){
  const set = new Set(dates.filter(pred));
  let best = 0;
  set.forEach(d0=>{
    const prev = parseYmd(d0); prev.setDate(prev.getDate()-1);
    if(set.has(ymd(prev))) return; // не начало серии
    let len = 0; const d = parseYmd(d0);
    while(set.has(ymd(d))){ len++; d.setDate(d.getDate()+1); }
    best = Math.max(best, len);
  });
  return best;
}
function maxHabitStreakEver(){
  let best = 0;
  P.spheres.forEach(s=>s.habits.forEach(h=>{ best = Math.max(best, habitStats(h.id).maxAll); }));
  return best;
}
const ACH_CHECKS = {
  1: ()=> completedDates().length >= 1,
  2: ()=> P.onboarding.done,
  3: ()=> completedDates().some(d=>isPerfectDay(P.days[d])),
  4: ()=> maxConsecutive(completedDates(), ()=>true) >= 7,
  5: ()=> maxConsecutive(completedDates(), d=>isPerfectDay(P.days[d])) >= 7,
  6: ()=> maxConsecutive(completedDates(), ()=>true) >= 30,
  7: ()=> doneGoalsCount() >= 1,  8: ()=> doneGoalsCount() >= 2,  9: ()=> doneGoalsCount() >= 3,
  10:()=> doneGoalsCount() >= 5, 11:()=> doneGoalsCount() >= 10, 12:()=> doneGoalsCount() >= 20,
  13:()=> maxHabitStreakEver() >= 7, 14:()=> maxHabitStreakEver() >= 14,
  15:()=> maxHabitStreakEver() >= 21, 16:()=> maxHabitStreakEver() >= 30,
  17:()=> boughtCostumes() >= 1 || houseUpgradesCount() >= 1,
  18:()=> boughtCostumes() >= 3, 19:()=> boughtCostumes() >= 7, 20:()=> boughtCostumes() >= 15,
  21:()=> houseUpgradesCount() >= 3, 22:()=> houseUpgradesCount() >= 7, 23:()=> houseUpgradesCount() >= 15,
  24:()=> maxedRoomsCount() >= 1, 25:()=> maxedRoomsCount() >= 3, 26:()=> maxedRoomsCount() >= 7,
  27:()=> P.purchases.events.length >= 1, 28:()=> P.purchases.travels.length >= 1,
  29:()=> P.purchases.events.length >= 10, 30:()=> P.purchases.travels.length >= 5,
};
function doneGoalsCount(){ return P.goals.filter(g=>g.status==='done').length; }
function boughtCostumes(){ return P.purchases.costumes.filter(id=>id!==0).length; }
function houseUpgradesCount(){
  let n = 0;
  for(const id in P.purchases.house){ const st = P.purchases.house[id];
    n += (st.level||0) + (HOUSE_ROOMS.find(r=>r.id===id).unlock>0 && st.unlocked ? 1 : 0); }

}
function maxedRoomsCount(){
  return HOUSE_ROOMS.filter(r=>{
    const st = P.purchases.house[r.id];
    return st && (st.level||0) >= r.upgrades.length && (r.unlock===0 || st.unlocked);
  }).length;
}

/* Запоминаем, кто вошёл и где находится, чтобы обновление страницы не «выкидывало» из системы */
function persistSession(){
  DB.session = P ? {profileId:P.id, screen:(SCREEN==='app'?'app':'landing'), tab:TAB} : null;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(DB)); }catch(e){}
}
function restoreSession(){
  const ss = DB.session;
  if(!ss || !ss.profileId) return;
  const pf = DB.profiles.find(p=>p.id===ss.profileId);
  if(!pf) return;
  P = pf;
  P.lastLoginAt = Date.now();
  if(ss.screen==='app' && P.settings.quizDone){
    SCREEN = 'app';
    TAB = ss.tab || 'day';
    OPEN_DATE = todayYmd();
  }
  saveDB();
}

function openQuiz(fromSettings){
  applyTheme();
  let step = 0;
  const s = P.settings;
  const draft = {name:P.name, theme:s.theme, weekStart:s.weekStart, focus:s.focus, music:s.music};
  const m = openModal(`<div class="quiz-wrap">
    <div class="quiz-fairy">${imgHTML('images/quiz_fairy.png','Фея')}</div>
    <div class="quiz-main"><div class="quiz-dots">${'<span></span>'.repeat(5)}</div><div id="quiz-step"></div></div>
  </div>`, {wide:true});
  const stepEl = m.root.querySelector('#quiz-step');
  const dots = m.root.querySelectorAll('.quiz-dots span');
  function draw(){
    dots.forEach((d,i)=>d.classList.toggle('on', i<=step && step<5));
    if(step===0) stepEl.innerHTML = `<h3 class="mb">Как тебя зовут?</h3>
      <input id="q-name" maxlength="20" value="${esc(draft.name)}" style="width:100%" placeholder="Имя">
      <div class="mt"><button class="btn" id="q-next">Дальше</button></div>`;
    else if(step===1) stepEl.innerHTML = `<h3 class="mb">Выбери тему оформления</h3>
      <div class="flex wrap">${THEMES.map(t=>`<div style="text-align:center">
        <button class="theme-circle ${draft.theme===t.id?'sel':''}" data-t="${t.id}" style="background:${t.color}" title="${t.name}"></button>
        <div style="font-size:12.5px;font-weight:700;margin-top:4px">${t.name}</div></div>`).join('')}</div>
      <div class="mt"><button class="btn" id="q-next">Дальше</button></div>`;
    else if(step===2) stepEl.innerHTML = `<h3 class="mb">С какого дня начинается твоя неделя?</h3>
      <button class="choice-btn ${draft.weekStart===1?'sel':''}" data-v="1">Понедельник</button>
      <button class="choice-btn ${draft.weekStart===0?'sel':''}" data-v="0">Воскресенье</button>
      <div class="mt"><button class="btn" id="q-next">Дальше</button></div>`;
    else if(step===3) stepEl.innerHTML = `<h3 class="mb">Что для тебя главное в планировании?</h3>
      ${[['schedule','Расписание по часам'],['tasks','Списки дел'],['habits','Привычки']].map(([v,l])=>
        `<button class="choice-btn ${draft.focus===v?'sel':''}" data-v="${v}">${l}</button>`).join('')}
      <div class="mt"><button class="btn" id="q-next">Дальше</button></div>`;
    else if(step===4) stepEl.innerHTML = `<h3 class="mb">Включить фоновую музыку?</h3>
      <button class="choice-btn ${draft.music?'sel':''}" data-v="1">Да 🎵</button>
      <button class="choice-btn ${!draft.music?'sel':''}" data-v="0">Нет</button>
      <div class="mt"><button class="btn" id="q-next">Дальше</button></div>`;
    else stepEl.innerHTML = `<h3 class="mb">Всё готово! Твой волшебный дневник ждёт ✨</h3>
      <button class="btn big" id="q-start">Начать</button>`;
    // обработчики
    stepEl.querySelectorAll('.theme-circle').forEach(b=>b.onclick = ()=>{
      draft.theme = b.dataset.t; document.body.dataset.theme = draft.theme; draw(); });
    stepEl.querySelectorAll('.choice-btn').forEach(b=>b.onclick = ()=>{
      if(step===2) draft.weekStart = +b.dataset.v;
      if(step===3) draft.focus = b.dataset.v;
      if(step===4) draft.music = b.dataset.v==='1';
      draw();
    });
    const next = stepEl.querySelector('#q-next');
    if(next) next.onclick = ()=>{
      if(step===0){ const v = stepEl.querySelector('#q-name').value.trim(); if(!v) return; draft.name = v; }
      step++; draw();
    };
    const start = stepEl.querySelector('#q-start');
    if(start) start.onclick = ()=>{
      P.name = draft.name;
      const firstTime = !P.settings.quizDone;
      Object.assign(P.settings, draft, {quizDone:true});
      delete P.settings.name;
      if(firstTime && draft.focus) P.settings.focusUntil = Date.now() + 7*86400000;
      saveDB(); m.close();
      if(P.settings.music && userInteracted) playRandomTrack();
      if(!P.settings.music){ audio.pause(); }
      if(fromSettings) render(); else { OPEN_DATE = todayYmd(); render(); }
    };
  }
  draw();
}

/* Предзагрузка всех статичных картинок — один раз за сессию.
   Прогревает кэш браузера, чтобы вкладки не «моргали» при переключении. */
function preloadImages(){
  if(IMGS_PRELOADED) return;
  IMGS_PRELOADED = true;
  const L = [];
  for(let i=1;i<=12;i++) L.push(`day_header_month_${pad2(i)}.png`);
  DEFAULT_SPHERES.forEach(s=>[...s.tasks, ...s.habits].forEach(it=>{ if(it.img) L.push(it.img); }));
  COSTUMES.forEach(cs=>L.push(`char_costume_${pad2(cs.id)}.png`));
  HOUSE_ROOMS.forEach(r=>{ for(let l=0;l<=r.upgrades.length;l++) L.push(`${r.file}_lvl${l}.png`); });
  EVENTS.forEach(ev=>L.push(`event_${pad2(ev.id)}_1.png`));
  TRAVELS.forEach(t=>{ for(let g=1;g<=3;g++) L.push(`travel_${pad2(t.id)}_${g}.png`); });
  ['winter','spring','summer','autumn'].forEach(sn=>{
    ['spheres','goals'].forEach(p=>{ L.push(`${p}_side_${sn}.png`); L.push(`${p}_side_${sn}_wide.png`); });
  });
  L.push('ach_side.png','ach_side_wide.png','diary_spread.png','popup_day_done.png','onboarding_welcome.png','quiz_fairy.png','logo.png','welcome_hero.png');
  // грузим по 4 параллельно, не мешая интерфейсу
  let i = 0;
  const next = ()=>{
    if(i >= L.length) return;
    const im = new Image();
    im.onload = im.onerror = ()=>setTimeout(next, 0);
    im.src = 'images/' + L[i++];
  };
  for(let k=0;k<4;k++) next();
}

/* ================= ВКЛАДКА «ДЕНЬ» (раздел 7) ================= */
function getDay(date){
  if(!P.days[date]) P.days[date] = {schedule:[], tasks:[], habits:[], note:'', completed:false};
  return P.days[date];
}
function dayHasItems(d){ return (d.schedule.length + d.tasks.length + d.habits.length) > 0; }
function dayAllMarked(d){ return [...d.schedule,...d.tasks,...d.habits].every(it=>it.mark); }
function isPastDate(date){ return date < todayYmd(); }
function sphereOf(id){ return P.spheres.find(s=>s.id===id); }
function sphereColor(id){ const s = sphereOf(id); return s? s.color : 'var(--accent)'; }

function renderDayTab(c){
  const date = OPEN_DATE;
  const day = getDay(date);
  const d = parseYmd(date);
  const month = d.getMonth();
  const banner = 'images/day_header_month_'+String(month+1).padStart(2,'0')+'.png';
  const caption = `${SEASONS[month]}, ${d.getDate()}.${String(month+1).padStart(2,'0')}.${d.getFullYear()}, ${DOW_RU[d.getDay()]}`;
  const past = isPastDate(date), setup = DAY_MODE==='setup', mark = DAY_MODE==='mark';
  const locked = day.completed || (past && !day.completed);
  const focusHL = b => (P.settings.focus===b && P.settings.focusUntil && Date.now()<P.settings.focusUntil) ? 'hl' : '';
  c.innerHTML = `
    <div id="day-banner">${imgHTML(banner,'Баннер месяца')}<div class="banner-caption">${caption}</div></div>
    <div class="day-layout ${day.completed?'dim':''}">
      <div class="day-col">
        <div class="day-block ${setup?'setup-mode':''} ${focusHL('schedule')}" id="blk-schedule">
          <h3>🕐 Расписание <span class="count">${day.schedule.length}/10</span>
            ${setup && day.schedule.length<10 && lastFilledDay(date,'schedule')? `<button class="btn small secondary right" data-copy="schedule">Скопировать прошлые</button>`:''}
          </h3>
          <div class="items"></div>
          ${setup? `<button class="add-item-btn" data-add="schedule" ${day.schedule.length>=10?'disabled data-hint="Лимит: 10 дел расписания"':''}>${ICONS.plus} Добавить</button>`:''}
        </div>
        <div class="day-block ${setup?'setup-mode':''} ${focusHL('habits')}" id="blk-habits">
          <h3>🔁 Привычки <span class="count">${day.habits.length}/10</span>
            ${setup && day.habits.length<10 && lastFilledDay(date,'habits')? `<button class="btn small secondary right" data-copy="habits">Скопировать прошлые</button>`:''}
          </h3>
          <div class="items"></div>
          ${setup? `<button class="add-item-btn" data-add="habits" ${day.habits.length>=10?'disabled data-hint="Лимит: 10 привычек"':''}>${ICONS.plus} Добавить</button>`:''}
        </div>
      </div>
      <div class="day-col">
        <div class="day-block ${setup?'setup-mode':''} ${focusHL('tasks')}" id="blk-tasks">
          <h3>📋 Задачи дня <span class="count">${day.tasks.length}/10</span>
            ${setup && day.tasks.length<10 && lastFilledDay(date,'tasks')? `<button class="btn small secondary right" data-copy="tasks">Скопировать прошлые</button>`:''}
          </h3>
          <div class="items"></div>
          ${setup? `<button class="add-item-btn" data-add="tasks" ${day.tasks.length>=10?'disabled data-hint="Лимит: 10 задач дня"':''}>${ICONS.plus} Добавить</button>`:''}
        </div>
        <div class="day-block">
          <h3>📝 Заметки ${!locked && !noteEditing(date, day)? `<button class="btn small secondary right" id="edit-note">${ICONS.pencil} Редактировать</button>`:''}</h3>
          ${noteEditing(date, day) && !locked ? `
            <textarea id="day-note" maxlength="2000" placeholder="Мысли, планы, наблюдения… Ссылки станут кликабельными.">${esc(day.note)}</textarea>
            <div class="note-count"><span id="note-count">${day.note.length}</span>/2000</div>
            <button class="btn small" id="save-note">Сохранить</button>`
          : `<div class="note-view">${day.note? linkify(day.note) : '<span class="muted">Пока пусто'+(locked?'':' — нажми «Редактировать»')+'</span>'}</div>`}
        </div>
      </div>
      <div class="day-side">
        <div class="day-block">${miniCalHTML()}</div>
        <div class="side-btns" id="side-btns"></div>
        ${mark? legendHTML(day) : ''}
        ${day.completed? `<div style="text-align:center;margin-top:12px"><span class="day-done-badge">${ICONS.check} День завершён</span></div>`:''}
      </div>
    </div>`;
  // элементы дня
  renderDayItems(c.querySelector('#blk-schedule .items'), day.schedule, 'schedule', day);
  renderDayItems(c.querySelector('#blk-tasks .items'), day.tasks, 'tasks', day);
  renderDayItems(c.querySelector('#blk-habits .items'), day.habits, 'habits', day);
  // календарь
  bindMiniCal(c);
  // кнопки
  renderSideBtns(c.querySelector('#side-btns'), day);
  // заметка
  const en = c.querySelector('#edit-note');
  if(en) en.onclick = ()=>{ NOTE_EDIT = date; render(); };
  const note = c.querySelector('#day-note');
  if(note){
    note.oninput = ()=> c.querySelector('#note-count').textContent = note.value.length;
    if(NOTE_EDIT===date) note.focus();
  }
  const sn = c.querySelector('#save-note');
  if(sn) sn.onclick = ()=>{ day.note = note.value; NOTE_EDIT = null; saveDB(); toast('Заметка сохранена'); render(); };
  // добавление
  c.querySelectorAll('[data-add]').forEach(b=>b.onclick = ()=>openAddMenu(b.dataset.add, day, b));
  // копирование из последнего заполненного дня
  c.querySelectorAll('[data-copy]').forEach(b=>b.onclick = ()=>{
    const kind = b.dataset.copy;
    const src = lastFilledDay(date, kind);
    if(!src) return;
    const limit = 10;
    P.days[src][kind].forEach(o=>{
      if(day[kind].length>=limit) return;
      if(kind==='habits'){
        if(day.habits.some(x=>x.habitId && x.habitId===o.habitId)) return;
        day.habits.push({id:uid(), name:o.name, habitId:o.habitId, sphereId:o.sphereId, goalId:o.goalId||null, img:o.img||null, imgs:imgsOf(o).slice(), mark:null});
      } else {
        if(day[kind].some(x=>x.name.toLowerCase()===o.name.toLowerCase())) return;
        const item = {id:uid(), name:o.name, sphereId:o.sphereId||null, img:o.img||null, imgs:imgsOf(o).slice(), mark:null};
        if(kind==='schedule'){ item.time = o.time; item.dur = o.dur||60; }
        day[kind].push(item);
      }
    });
    saveDB(); onbComplete(2); render();
  });
  // подсветка пересечений расписания
  markOverlaps(day);
}
function lastFilledDay(before, kind){
  const dates = Object.keys(P.days).filter(d=>d<before && P.days[d][kind] && P.days[d][kind].length).sort();
  return dates.length ? dates[dates.length-1] : null;
}
function noteEditing(date, day){
  const locked = day.completed || isPastDate(date);
  return !locked && (NOTE_EDIT===date || !day.note);
}
/* превращает URL в кликабельные ссылки (текст предварительно экранируется) */
function linkify(text){
  return esc(text).replace(/(https?:\/\/[^\s<]+)/g,
    u=>`<a href="${u}" target="_blank" rel="noopener">${u}</a>`);
}
function markOverlaps(day){
  const items = [...day.schedule].sort((a,b)=>a.time<b.time?-1:1);
  for(let i=1;i<items.length;i++){
    const prev = items[i-1];
    const [ph,pm] = prev.time.split(':').map(Number);
    const endPrev = ph*60+pm + (prev.dur||60);
    const [ch2,cm] = items[i].time.split(':').map(Number);
    if(ch2*60+cm < endPrev){
      const elc = document.querySelector(`[data-item="${items[i].id}"]`);
      if(elc){ elc.style.boxShadow = '0 0 0 2px var(--part)'; elc.title = 'Пересекается по времени с предыдущим делом'; }
    }
  }
}
function renderDayItems(container, list, kind, day){
  if(kind==='schedule') list.sort((a,b)=> (a.time||'') < (b.time||'') ? -1 : 1);
  container.innerHTML = list.map(it=>{
    const marks = kind==='habits' ? ['done','fail'] : ['done','part','fail','cancel'];
    const imgs = imgsOf(it);
    return `<div class="item-card" data-item="${it.id}" style="--sphere-color:${sphereColor(it.sphereId)}">
      ${it.time? `<span class="time-badge">${it.time}<div style="font-size:11px;font-weight:600;color:#A395C2">${durLabel(it.dur||60)}</div></span>`:''}
      ${imgs.length? `<span class="thumb-wrap"><img class="thumb" src="${srcOf(imgs[0])}" data-view="${it.id}" alt="" onerror="this.parentNode.remove()">${imgs.length>1?`<span class="thumb-count">+${imgs.length-1}</span>`:''}</span>`:''}
      <span class="title">${it.goalId? '<span class="goal-flag" title="Дело цели">🎯</span> ':''}${esc(it.name)}</span>
      ${DAY_MODE==='mark' && !day.completed ? `<span class="marks">${marks.map(mk=>
        `<button class="mark-btn mark-${mk} ${it.mark===mk?'sel':''}" data-mark="${mk}" data-for="${it.id}" title="${({done:'Выполнено',part:'Частично',fail:'Не выполнено',cancel:'Отменено'})[mk]}">${MARK_SYMBOLS[mk]}</button>`).join('')}</span>`
      : it.mark? `<span class="marks"><span class="mark-btn mark-${it.mark} sel" style="cursor:default">${MARK_SYMBOLS[it.mark]}</span></span>` : ''}
      ${DAY_MODE==='setup' && !day.completed ? `<span class="marks">
        <button class="iconbtn" data-edit="${it.id}" title="Редактировать">${ICONS.pencil}</button>
        <button class="iconbtn" data-img="${it.id}" title="Картинки (до 5)">${ICONS.camera}</button>
        <button class="iconbtn" data-del="${it.id}" title="Убрать из дня">${ICONS.trash}</button></span>`:''}
    </div>`;
  }).join('') || `<p class="muted" style="padding:4px 2px">${DAY_MODE==='setup'?'Нажми «Добавить» ниже':'Пока пусто'}</p>`;
  // отметки: клик ставит, повторный клик по той же — снимает (пока день не завершён)
  container.querySelectorAll('[data-mark]').forEach(b=>b.onclick = ()=>{
    const it = list.find(x=>x.id===b.dataset.for);
    it.mark = (it.mark === b.dataset.mark) ? null : b.dataset.mark;
    saveDB(); render();
  });
  // редактирование / удаление / картинки
  container.querySelectorAll('[data-edit]').forEach(b=>b.onclick = ()=>{
    openItemEdit(list.find(x=>x.id===b.dataset.edit), kind);
  });
  container.querySelectorAll('[data-del]').forEach(b=>b.onclick = ()=>{
    const i = list.findIndex(x=>x.id===b.dataset.del); list.splice(i,1); saveDB(); render();
  });
  container.querySelectorAll('[data-img]').forEach(b=>b.onclick = ()=>{
    openImagesEdit(list.find(x=>x.id===b.dataset.img));
  });
  container.querySelectorAll('[data-view]').forEach(im=>im.onclick = ()=>{
    const it = list.find(x=>x.id===im.dataset.view);
    openGallery(it, day.completed);
  });
}
/* редактирование любого дела/привычки дня (в т.ч. вписанного вручную) */
function openItemEdit(it, kind){
  const m = openModal(`<h3 class="mb">Редактировать</h3>
    <div class="field"><label>Название</label><input id="ie-name" maxlength="100" value="${esc(it.name)}"></div>
    ${kind==='schedule'? timeFields('ie', it.time, it.dur) : ''}
    <div style="text-align:right"><button class="btn" id="ie-save">Сохранить</button></div>`);
  const $ = s=>m.root.querySelector(s);
  $('#ie-name').focus();
  $('#ie-save').onclick = ()=>{
    const name = $('#ie-name').value.trim(); if(!name) return;
    it.name = name;
    if(kind==='schedule'){ it.time = $('#ie-time').value; it.dur = +$('#ie-dur').value; }
    saveDB(); m.close(); render();
  };
}
/* ---- картинки позиций: до 5 штук с листалкой ---- */
function imgsOf(it){
  if(Array.isArray(it.imgs) && it.imgs.length) return it.imgs;
  return it.img ? [it.img] : [];
}
function srcOf(im){ return im.startsWith('data:')? im : 'images/'+im; }
function syncImg(it){ it.imgs = imgsOf(it); it.img = it.imgs[0] || null; }
function openGallery(it, readOnly){
  const imgs = imgsOf(it);
  if(!imgs.length) return;
  let gi = 0;
  const m = openModal(`
    <div style="position:relative">
      <div id="gal-img" style="border-radius:12px;overflow:hidden;margin-bottom:10px;height:min(420px,56vh);display:flex;justify-content:center;align-items:center;background:#F3EEFB"></div>
      ${imgs.length>1? `
        <button class="gal-arr" id="gal-prev" style="left:8px">‹</button>
        <button class="gal-arr" id="gal-next" style="right:8px">›</button>`:''}
    </div>
    ${imgs.length>1? `<div class="gallery-dots" id="gal-dots">${imgs.map((_,i)=>`<span data-g="${i}" class="${i===0?'on':''}"></span>`).join('')}</div>`:''}
    <p class="caveat" style="text-align:center">${esc(it.name||it.title||'')}</p>
    ${readOnly?'':'<div style="text-align:center" class="mt"><button class="btn secondary small" id="gal-edit">Управлять картинками</button></div>'}`);
  const box = m.root.querySelector('#gal-img');
  const draw = ()=>{
    box.innerHTML = `<img src="${srcOf(imgs[gi])}" alt="" style="max-width:100%;max-height:100%;object-fit:contain">`;
    m.root.querySelectorAll('[data-g]').forEach(d=>d.classList.toggle('on', +d.dataset.g===gi));
  };
  draw();
  const step = d => { gi = (gi + d + imgs.length) % imgs.length; draw(); };
  const pv = m.root.querySelector('#gal-prev'), nx = m.root.querySelector('#gal-next');
  if(pv) pv.onclick = ()=>step(-1);
  if(nx) nx.onclick = ()=>step(1);
  m.root.querySelectorAll('[data-g]').forEach(d=>d.onclick = ()=>{ gi = +d.dataset.g; draw(); });
  const ed = m.root.querySelector('#gal-edit');
  if(ed) ed.onclick = ()=>{ m.close(); openImagesEdit(it); };
}
function openImagesEdit(it, title){
  syncImg(it);
  const m = openModal(`<h3 class="mb">${esc(title || 'Картинки: '+(it.name||it.title||''))}</h3>
    <p class="muted mb" style="font-size:13.5px">Можно прикрепить до 5 картинок — они листаются при просмотре.</p>
    <div id="ie-imgs" class="flex wrap"></div>
    <div class="mt"><button class="btn secondary small" id="ie-addimg">${ICONS.plus} Добавить картинку</button></div>`,
    {onClose:render});
  const box = m.root.querySelector('#ie-imgs'), addBtn = m.root.querySelector('#ie-addimg');
  const draw = ()=>{
    box.innerHTML = it.imgs.map((im,i)=>`<span style="position:relative;display:inline-block">
      <img src="${srcOf(im)}" alt="" style="width:96px;height:96px;object-fit:cover;border-radius:10px;box-shadow:var(--shadow)">
      <button class="iconbtn" data-rmimg="${i}" title="Удалить" style="position:absolute;top:2px;right:2px;background:#fff;border-radius:50%">${ICONS.trash}</button>
    </span>`).join('') || '<p class="muted">Картинок пока нет</p>';
    addBtn.style.display = it.imgs.length>=5 ? 'none' : '';
    box.querySelectorAll('[data-rmimg]').forEach(b=>b.onclick = async ()=>{
      if(await confirmModal('Удалить картинку?', 'Да, удалить')){
        it.imgs.splice(+b.dataset.rmimg, 1); syncImg(it); saveDB(); draw();
      }
    });
  };
  draw();
  addBtn.onclick = ()=>{
    const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
    inp.onchange = async ()=>{
      try{
        const d = await compressImage(inp.files[0]);
        it.imgs.push(d); syncImg(it); saveDB(); draw();
      }catch(e){ toast(STRINGS.storageFull); }
    };
    inp.click();
  };
}
/* обратная совместимость со старыми вызовами */

    <p class="muted" style="font-size:12.5px;margin-top:8px">«Сохранить» — оставить проставленные отметки и выйти. «Отменить» — сбросить все отметки.</p></div>`;

function renderSideBtns(box, day){
  const past = isPastDate(OPEN_DATE);
  if(DAY_MODE==='setup'){
    box.innerHTML = `
      <button class="btn secondary" id="d-save">Сохранить</button>
      <button class="btn secondary" id="d-clear">Очистить</button>
      <button class="btn" id="d-done">Завершить настройку</button>`;
    box.querySelector('#d-save').onclick = ()=>{ saveDB(); toast('Изменения сохранены'); };
    box.querySelector('#d-clear').onclick = async ()=>{
      if(await confirmModal('Удалить все позиции этого дня?', 'Да, очистить')){
        day.schedule=[]; day.tasks=[]; day.habits=[]; saveDB(); render();
      }};
    box.querySelector('#d-done').onclick = ()=>{ DAY_MODE='view'; saveDB(); render(); };
    return;
  }
  if(DAY_MODE==='mark'){
    box.innerHTML = '';
    setTimeout(()=>{
      const ms = document.getElementById('mark-save');
      if(ms) ms.onclick = ()=>{
        DAY_MODE='view'; saveDB(); toast('Отметки сохранены — можно вернуться и доотметить позже'); render();
      };
      const ca = document.getElementById('mark-cancel-all');
      if(ca) ca.onclick = ()=>{
        [...day.schedule,...day.tasks,...day.habits].forEach(it=>it.mark=null);
        DAY_MODE='view'; saveDB(); render();
      };
      const fd = document.getElementById('finish-day');
      if(fd && !fd.disabled) fd.onclick = ()=>completeDay(day);
    });
    return;
  }
  const saved = !!P.savedKeys['day:'+OPEN_DATE];
  box.innerHTML = `
    <button class="btn" id="d-setup" ${past || day.completed ? `disabled data-hint="${day.completed?'День завершён и заблокирован':STRINGS.hintPastDay}"`:''}>Настроить день</button>
    <button class="btn" id="d-mark" ${!dayHasItems(day) || day.completed ? `disabled data-hint="${day.completed?'День уже завершён':STRINGS.hintMark}"`:''}>Отметить выполнение</button>
    <button class="btn ${saved?'secondary':''}" id="d-diary" ${!day.completed || saved ? `disabled data-hint="${saved?'Уже в дневнике':STRINGS.hintSaveDiary}"`:''}>${saved?'Сохранено ✓':'Сохранить день в дневник'}</button>`;
  const st = box.querySelector('#d-setup');
  if(!st.disabled) st.onclick = ()=>{ DAY_MODE='setup'; render(); };
  const mk = box.querySelector('#d-mark');
  if(!mk.disabled) mk.onclick = ()=>{ DAY_MODE='mark'; render(); };
  const dr = box.querySelector('#d-diary');
  if(!dr.disabled) dr.onclick = ()=>saveDayToDiary(day);
}
function completeDay(day){
  let earned = 0, penalty = 0;
  const goalGain = [];
  [...day.schedule, ...day.tasks].forEach(it=>{
    if(it.mark==='done'){ earned += 10;
      if(it.goalId){ const r = markGoalTaskDone(it.goalId, it.goalTaskId); if(r) goalGain.push(r); earned += 10; } }
    else if(it.mark==='part') earned += 5;
    else if(it.mark==='fail') penalty += 5;
  });
  day.habits.forEach(it=>{
    if(it.mark==='done') earned += 5;
    else if(it.mark==='fail') penalty += 5;
  });
  day.completed = true; day.completedAt = Date.now();
  addCoins(earned - penalty);
  DAY_MODE = 'view';
  saveDB();
  trackGoal('day_completed');
  onbComplete(3);
  checkAchievements();
  checkGoalAutoStatuses();
  const m = openModal(`
    <div style="border-radius:14px;overflow:hidden;aspect-ratio:480/280;margin-bottom:14px">${imgHTML('images/popup_day_done.png','')}</div>
    <h2 style="text-align:center;margin-bottom:12px">День завершён!</h2>
    <div style="text-align:center;font-size:17px;font-weight:700">
      <p style="color:var(--ok)">Начислено: +${earned}</p>
      ${penalty? `<p style="color:var(--fail)">Штрафы: −${penalty}</p>`:''}
      <p style="margin-top:6px">Счёт: ${P.coins} ${ICONS.coin}</p>
    </div>
    <div style="text-align:center" class="mt"><button class="btn big" id="to-rewards">К наградам</button></div>`,
    {narrow:true, onClose:render});
  m.root.querySelector('#to-rewards').onclick = ()=>{ m.close(); gotoTab('rewards'); };
}
function saveDayToDiary(day){
  addDiaryEntry({
    type:'day', key:'day:'+OPEN_DATE, phrase:DIARY_PHRASES.day, date:OPEN_DATE,
    payload:{
      date:OPEN_DATE, note:day.note,
      items:[...day.schedule.map(i=>({...i, kind:'РАСПИСАНИЕ'})),
             ...day.tasks.map(i=>({...i, kind:'ЗАДАЧИ'})),
             ...day.habits.map(i=>({...i, kind:'ПРИВЫЧКИ'}))]
        .map(i=>({name:i.name, time:i.time||null, mark:i.mark, img:i.img||null, kind:i.kind})),
    }
  });
  render();
}

/* ---- Мини-календарь ---- */
function miniCalHTML(){
  if(!CAL_VIEW){ const d = parseYmd(OPEN_DATE); CAL_VIEW = {y:d.getFullYear(), m:d.getMonth()}; }
  const {y, m} = CAL_VIEW;
  const ws = P.settings.weekStart; // 1=Пн, 0=Вс
  const dows = ws===1 ? DOW_SHORT_MON : DOW_SHORT_SUN;
  const first = new Date(y, m, 1);
  let offset = (first.getDay() - ws + 7) % 7;
  const daysIn = new Date(y, m+1, 0).getDate();
  const today = todayYmd();
  let cells = '';
  for(let i=0;i<offset;i++) cells += '<span></span>';
  for(let dd=1; dd<=daysIn; dd++){
    const key = y+'-'+String(m+1).padStart(2,'0')+'-'+String(dd).padStart(2,'0');
    const day = P.days[key];
    let dot = '';
    if(day && day.completed) dot = `<span class="mark-dot" style="background:var(--ok)"></span>`;
    else if(day && dayHasItems(day)) dot = `<span class="mark-dot" style="background:var(--part)"></span>`;
    else if(key < today) dot = `<span class="mark-dot" style="background:#CFC6E0"></span>`;
    cells += `<button class="cal-day ${key===today?'today':''} ${key===OPEN_DATE?'open':''}" data-date="${key}">${dd}${dot}</button>`;
  }
  return `<div class="mini-cal">
    <div class="cal-head">${MONTHS_NOM[m]} ${y}</div>
    <div class="cal-grid">${dows.map(d=>`<span class="dow">${d}</span>`).join('')}${cells}</div>
    <div class="cal-nav"><button id="cal-prev" title="Предыдущий месяц">‹</button><button id="cal-next" title="Следующий месяц">›</button></div>
  </div>`;
}
function bindMiniCal(c){
  c.querySelector('#cal-prev').onclick = ()=>{ CAL_VIEW.m--; if(CAL_VIEW.m<0){CAL_VIEW.m=11;CAL_VIEW.y--;} render(); };
  c.querySelector('#cal-next').onclick = ()=>{ CAL_VIEW.m++; if(CAL_VIEW.m>11){CAL_VIEW.m=0;CAL_VIEW.y++;} render(); };
  c.querySelectorAll('.cal-day').forEach(b=>b.onclick = ()=>{
    OPEN_DATE = b.dataset.date; DAY_MODE='view';
    const d = parseYmd(OPEN_DATE); CAL_VIEW = {y:d.getFullYear(), m:d.getMonth()};

  });
}

function pickTimeSelect(id, val){
  const times = [];
  for(let h=0;h<24;h++) for(let mm=0;mm<60;mm+=15)
    times.push(String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0'));
  return `<label>Время: <select data-time="${id}">
      <option value="">— без времени —</option>
      ${times.map(t=>`<option ${t===val?'selected':''}>${t}</option>`).join('')}
    </select></label>
    <label data-durbox="${id}" style="${val?'':'display:none'}">Длительность: <select data-dur="${id}">
      ${DUR_OPTIONS.map(v=>`<option value="${v}" ${v===60?'selected':''}>${durLabel(v)}</option>`).join('')}
    </select></label>`;
}
function bindPickExtras(box, picked){
  box.querySelectorAll('[data-time]').forEach(sel=>sel.onchange = ()=>{
    const p = picked.get(sel.dataset.time); if(!p) return;
    p.time = sel.value || null;
    const db = box.querySelector(`[data-durbox="${sel.dataset.time}"]`);
    if(db) db.style.display = p.time ? '' : 'none';
  });
  box.querySelectorAll('[data-dur]').forEach(sel=>sel.onchange = ()=>{
    const p = picked.get(sel.dataset.dur); if(p) p.dur = +sel.value;
  });
}
function distributePicked(picked, day){
  let added = 0, skipped = 0;
  picked.forEach(p=>{
    const pImgs = p.imgs && p.imgs.length ? p.imgs.slice() : (p.img? [p.img]:[]);
    if(p.type==='habit'){
      if(day.habits.length>=10 || (p.habitId && day.habits.some(x=>x.habitId===p.habitId))){ skipped++; return; }
      day.habits.push({id:uid(), name:p.name, habitId:p.habitId||null, sphereId:p.sphereId||null, goalId:p.goalId||null, img:pImgs[0]||null, imgs:pImgs, mark:null});
      added++;
    } else if(p.time){
      if(day.schedule.length>=10){ skipped++; return; }
      day.schedule.push({id:uid(), name:p.name, time:p.time, dur:p.dur||60, sphereId:p.sphereId||null, goalId:p.goalId||null, goalTaskId:p.goalTaskId||null, img:pImgs[0]||null, imgs:pImgs, mark:null});
      added++;
    } else {
      if(day.tasks.length>=10){ skipped++; return; }
      day.tasks.push({id:uid(), name:p.name, sphereId:p.sphereId||null, goalId:p.goalId||null, goalTaskId:p.goalTaskId||null, img:pImgs[0]||null, imgs:pImgs, mark:null});
      added++;
    }
  });
  if(skipped) toast('Часть позиций не добавлена — достигнут лимит или уже есть в дне');
  return added;
}

/* ================= ЦЕЛИ: ВСПОМОГАТЕЛЬНЫЕ ================= */
function goalProgress(g){
  let parts = 0, sum = 0;
  g.tasks.forEach(t=>{ parts++; if(t.done) sum++; });
  g.habits.forEach(h=>{
    parts++;
    const st = habitStats(h.habitId);
    const fTotal  = h.targetTotal  ? Math.min(1, st.total  / h.targetTotal)  : 0;
    const fStreak = h.targetStreak ? Math.min(1, st.maxAll / h.targetStreak) : 0;
    sum += Math.max(fTotal, fStreak);
  });
  return parts ? Math.round(sum / parts * 100) : 0;
}
function markGoalTaskDone(goalId, goalTaskId){
  const g = P.goals.find(x=>x.id===goalId);
  if(!g) return null;
  if(g.status==='created') g.status = 'active';
  const t = g.tasks.find(x=>x.id===goalTaskId);
  if(t && !t.done){ t.done = true; saveDB(); return {goal:g.title, task:t.name}; }
  saveDB();
  return null;
}
function checkGoalAutoStatuses(){
  const today = todayYmd();
  let changed = false;
  P.goals.forEach(g=>{
    if(['created','active'].includes(g.status) && g.deadline && g.deadline < today){
      g.status = 'expired'; changed = true;
      toast(`Срок цели «${g.title}» истёк — она ждёт твоего решения`);
    }
  });
  if(changed) saveDB();
}
function setGoalStatus(g, status){
  if(g.status === status) return;
  if(g.status === 'done'){ toast('Эта цель завершена! Создай новую цель.'); return; }
  g.status = status;
  if(status==='done'){
    addCoins(100);
    trackGoal('goal_achieved');
    confetti();
    toast(`Цель «${g.title}» достигнута! Бонус за цель: +100 монет`);
    checkAchievements();
  }
  saveDB(); render();
}

/* ================= ВКЛАДКА «СФЕРЫ» (раздел 9) ================= */
function seasonKey(){
  const mo = new Date().getMonth()+1;
  return (mo===12||mo<=2) ? 'winter' : mo<=5 ? 'spring' : mo<=8 ? 'summer' : 'autumn';
}
function sideIllu(prefix){
  const base = prefix==='ach' ? 'images/ach_side' : `images/${prefix}_side_${seasonKey()}`;
  return `<div class="side-illu">${imgHTML(base+'.png','')}</div>
    <div class="side-illu-wide">${imgHTML(base+'_wide.png','')}</div>`;
}
function sphereActivity30(){
  // сколько «done» по каждой сфере за последние 30 дней
  const from = new Date(); from.setDate(from.getDate()-29);
  const fromK = ymd(from);
  const counts = {};
  for(const date in P.days){
    if(date < fromK) continue;
    const d = P.days[date];
    [...d.schedule, ...d.tasks, ...d.habits].forEach(it=>{
      if(it.mark==='done' && it.sphereId) counts[it.sphereId] = (counts[it.sphereId]||0) + 1;
    });
  }
  return counts;
}
function pieSVG(counts, vertical){
  const entries = P.spheres.map(s=>({s, n:counts[s.id]||0})).filter(e=>e.n>0);
  const total = entries.reduce((a,e)=>a+e.n, 0);
  if(!total) return `<p class="empty-note" style="padding:12px 6px;font-size:13.5px">За последние 30 дней пока нет выполненных дел</p>`;
  let a0 = -Math.PI/2, paths = '';
  entries.forEach(e=>{
    const frac = e.n/total, a1 = a0 + frac*2*Math.PI;
    if(frac >= 0.999){
      paths += `<circle cx="90" cy="90" r="80" fill="${e.s.color}"/>`;
    } else {
      const x0=90+80*Math.cos(a0), y0=90+80*Math.sin(a0);
      const x1=90+80*Math.cos(a1), y1=90+80*Math.sin(a1);
      paths += `<path d="M90 90 L${x0.toFixed(1)} ${y0.toFixed(1)} A80 80 0 ${frac>0.5?1:0} 1 ${x1.toFixed(1)} ${y1.toFixed(1)} Z" fill="${e.s.color}"><title>${esc(e.s.name)}: ${e.n}</title></path>`;
    }
    a0 = a1;
  });
  const legend = entries.sort((a,b)=>b.n-a.n).map(e=>
    `<span><span class="sw" style="background:${e.s.color}"></span>${esc(e.s.name)} — ${e.n} (${Math.round(e.n/total*100)}%)</span>`).join('');
  return `<div class="flex wrap" style="gap:${vertical?14:22}px;align-items:center;${vertical?'flex-direction:column':''}">
    <svg viewBox="0 0 180 180" style="width:${vertical?150:180}px;height:${vertical?150:180}px;flex-shrink:0">${paths}
      <circle cx="90" cy="90" r="80" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2"/></svg>
    <div class="pie-legend" style="${vertical?'font-size:13px;align-self:stretch':''}">${legend}</div></div>`;
}

  const m = openModal(`<h3 class="mb">${isNew?'Новая сфера':'Редактировать сферу'}</h3>

        `<button class="sw" data-c="${cl}" style="width:30px;height:30px;border-radius:50%;border:${cl===cur.color?'3px solid var(--accent-dark)':'2px solid #fff'};background:${cl};box-shadow:0 1px 5px rgba(0,0,0,.2)"></button>`).join('')}</div></div>

function openSphereItemEdit(s, kind, it){
  const isNew = !it;
  const m = openModal(`<h3 class="mb">${isNew? (kind==='task'?'Новое дело':'Новая привычка') : 'Переименовать'}</h3>
    <div class="field"><label>Название</label>
      <input type="text" id="si-name" maxlength="80" value="${esc(it?it.name:'')}" placeholder="${kind==='task'?'Например: Порисовать 30 минут':'Например: Зарядка по утрам'}"></div>

function goalCard(g){
  const st = GOAL_STATUS[g.status];
  const prog = goalProgress(g);
  const open = OPEN_GOALS.has(g.id);
  const sph = sphereOf(g.sphereId);
  const card = el(`<div class="goal-card">
    <div class="goal-head" style="flex-wrap:wrap">
      <span style="transition:transform .25s;display:flex;color:var(--accent-dark);${open?'transform:rotate(90deg)':''}">${ICONS.right}</span>
      <b style="font-size:16.5px;color:var(--accent-dark);overflow-wrap:anywhere">${esc(g.title)}</b>
      <span class="status-badge ${st.cls}">${st.name}</span>
      ${sph? `<span class="sphere-tag" style="background:${sph.color}">${esc(sph.name)}</span>`:''}
      ${g.deadline? `<span class="muted" style="white-space:nowrap">до ${fmtDateRu(g.deadline)}</span>`:''}
      <span class="flex" style="flex-basis:100%;gap:10px;padding-left:30px">
        <span class="progress-wrap"><span class="progress-bar" style="width:${prog}%"></span></span>
        <span class="progress-label">${prog}%</span>
      </span>
    </div>
    <div class="goal-body" style="${open?'':'display:none'}"></div>
  </div>`);
  card.querySelector('.goal-head').onclick = ()=>{
    open ? OPEN_GOALS.delete(g.id) : OPEN_GOALS.add(g.id);
    render();
  };
  if(open) fillGoalBody(card.querySelector('.goal-body'), g);
  return card;
}
function fillGoalBody(body, g){
  const stKeys = ['active','frozen','done','cancelled'];
  const stLabels = {active:'В работу', frozen:'Заморозить', done:'Завершить 🏆', cancelled:'Отменить'};
  const isDone = g.status==='done';
  const gKey = `goal:${g.id}:${g.status}`;
  const savedG = !!P.savedKeys[gKey];
  const goalImgOf = name=>{
    const s = sphereOf(g.sphereId);
    if(!s) return null;
    const it = [...s.tasks, ...s.habits].find(x=>x.name.toLowerCase()===name.toLowerCase());
    return it ? it.img||null : null;
  };
  const statusBtns = isDone
    ? `<button class="btn small secondary" disabled data-hint="Эта цель завершена! Создай новую цель." data-click="1">В работу</button>`
    : stKeys.filter(k=>k!==g.status).map(k=>`<button class="btn small ${k==='done'?'':'secondary'}" data-st="${k}">${stLabels[k]}</button>`).join('');
  const gImgs = imgsOf(g);
  body.innerHTML = `
    <p class="mt" style="font-family:'Caveat';font-size:24px;color:var(--accent-dark)">${esc(GOAL_STATUS[g.status].phrase)}</p>
    ${gImgs.length? `<div class="mt" style="max-width:340px;border-radius:12px;overflow:hidden;position:relative;cursor:pointer" id="gb-gal" title="Открыть картинки">
      <img src="${srcOf(gImgs[0])}" style="width:100%;display:block" alt="">
      ${gImgs.length>1? `<span class="thumb-count" style="right:8px;bottom:8px">+${gImgs.length-1}</span>`:''}</div>`:''}
    <div class="flex wrap mt">
      ${statusBtns}
      <button class="btn small ${savedG?'secondary':''}" id="gb-diary" ${savedG?'disabled data-hint="Прогресс с этим статусом уже в дневнике" data-click="1"':''}>${savedG?'В дневнике ✓':'📖 Сохранить прогресс в дневник'}</button>
      <span class="right flex" style="gap:6px">
        <button class="iconbtn" id="gb-img" title="Картинки мечты (до 5)">${ICONS.camera}</button>
        <button class="iconbtn" id="gb-ed" title="Редактировать цель">${ICONS.pencil}</button>
        <button class="iconbtn" id="gb-rm" title="Удалить цель">${ICONS.trash}</button>
      </span>
    </div>
    ${g.tasks.length? `<h3 class="mt mb" style="font-size:15.5px">Задачи цели</h3>
      <div>${g.tasks.map(t=>`
        <label class="pick-check"><input type="checkbox" data-t="${t.id}" ${t.done?'checked':''} ${isDone?'disabled':''}>
          ${pickThumb(goalImgOf(t.name))}
          <span style="${t.done?'text-decoration:line-through;color:#9C8FB8':''}">${esc(t.name)}</span></label>`).join('')}</div>`:''}
    ${g.habits.length? `<h3 class="mt mb" style="font-size:15.5px">Привычки цели</h3>
      <div>${g.habits.map(h=>{
        const st = habitStats(h.habitId);
        const fT = h.targetTotal? Math.min(100, Math.round(st.total/h.targetTotal*100)) : null;
        const fS = h.targetStreak? Math.min(100, Math.round(st.maxAll/h.targetStreak*100)) : null;
        const hImg = goalImgOf(h.name);
        return `<div class="habit-stats" style="margin-bottom:8px">
          <span class="flex">${hImg? `<img class="thumb" style="width:34px;height:34px;border-radius:8px;object-fit:cover" src="${hImg.startsWith('data:')?hImg:'images/'+hImg}" alt="" onerror="this.remove()">`:''}<b>${esc(h.name)}</b></span>
          ${fT!==null? `<div class="flex mt" style="gap:10px"><span style="flex-basis:150px">Всего: ${st.total}/${h.targetTotal}</span>
            <span class="progress-wrap"><span class="progress-bar" style="width:${fT}%"></span></span></div>`:''}
          ${fS!==null? `<div class="flex mt" style="gap:10px"><span style="flex-basis:150px">Серия: ${st.maxAll}/${h.targetStreak}</span>
            <span class="progress-wrap"><span class="progress-bar" style="width:${fS}%"></span></span></div>`:''}
        </div>`;}).join('')}</div>
      <p class="muted">${esc(STRINGS.goalHabitHint)}</p>`:''}`;
  const gd = body.querySelector('#gb-diary');
  if(gd && !gd.disabled) gd.onclick = ()=>{
    addDiaryEntry({type:'goal', key:gKey, phrase:GOAL_STATUS[g.status].phrase, date:todayYmd(),
      payload:{title:g.title, img:g.img||null, progress:goalProgress(g)}});
    render();
  };
  body.querySelectorAll('[data-st]').forEach(b=>b.onclick = async ()=>{
    const k = b.dataset.st;
    if(k==='done' && !(await confirmModal(`Завершить цель «${g.title}»? Ты получишь +100 монет и запись в дневнике!`, 'Да, я молодец!'))) return;
    if(k==='cancelled' && !(await confirmModal(`Отменить цель «${g.title}»?`, 'Да, отменить'))) return;
    setGoalStatus(g, k);
  });
  body.querySelectorAll('[data-t]').forEach(cb=>cb.onchange = ()=>{
    const t = g.tasks.find(x=>x.id===cb.dataset.t);
    t.done = cb.checked;
    if(t.done && g.status==='created') g.status = 'active';
    saveDB(); render();
  });
  const gg = body.querySelector('#gb-gal');
  if(gg) gg.onclick = ()=>openGallery(g, false);
  body.querySelector('#gb-img').onclick = ()=>openImagesEdit(g, 'Картинки мечты');

    if(await confirmModal(`Удалить цель «${g.title}» насовсем?`, 'Да, удалить')){

      OPEN_GOALS.delete(g.id);
      saveDB(); render();
    }
  };
}
function openGoalEdit(g){

    <div class="field"><label>Мечта / цель</label>
      <input type="text" id="ge-title" maxlength="90" value="${esc(data.title)}" placeholder="Например: Выучить 500 английских слов"></div>

  function drawTasks(){
    tBox.innerHTML = data.tasks.map((t,i)=>`
      <div class="flex" style="margin-bottom:7px">
        <input type="text" data-ti="${i}" maxlength="80" value="${esc(t.name)}" placeholder="Задача ${i+1}">

    hBox.innerHTML = sph.habits.map(h=>{
      const gh = data.habits.find(x=>x.habitId===h.id);

          <label style="font-weight:600;font-size:13.5px">Дней подряд:
            <input type="number" min="1" max="365" data-hs="${h.id}" value="${gh? gh.targetStreak||'' : ''}" style="width:84px;padding:7px 9px" placeholder="7"></label>
        </div></div>`;
    }).join('');
    hBox.querySelectorAll('[data-h]').forEach(cb=>cb.onchange = ()=>{

    if(!title){ toast('Напиши, о чём мечта'); return; }
    const tasks = data.tasks.filter(t=>t.name.trim());
    const habits = data.habits.filter(h=>h.targetTotal || h.targetStreak);
    if(!tasks.length && !habits.length){ toast('Добавь хотя бы одну задачу или привычку'); return; }
    const payload = {
      title, sphereId:m.root.querySelector('#ge-sphere').value,
      deadline:m.root.querySelector('#ge-deadline').value || null,
      tasks, habits,
    };
    if(isNew){ P.goals.push({id:uid(), status:'created', createdAt:Date.now(), img:null, ...payload}); trackGoal('goal_created'); }
    else Object.assign(g, payload);
    saveDB(); m.close(); onbComplete(6); render();
  };
}

/* ================= ВКЛАДКА «ДНЕВНИК» (раздел 11) ================= */
const DIARY_PER_PAGE = 3;
function addDiaryEntry(e, silent){
  if(e.key && P.savedKeys[e.key]) return;
  P.diary.push({id:uid(), createdAt:Date.now(), ...e});
  if(e.key) P.savedKeys[e.key] = true;
  trackGoal('diary_saved');
  DIARY_PAGE = Math.max(0, Math.ceil(P.diary.length / (DIARY_PER_PAGE*2)) - 1);
  saveDB();
  onbComplete(5);
  if(!silent) toast('Запись добавлена в дневник 📖');
}
function diaryEntryHTML(e){
  const del = `<button class="iconbtn diary-del" data-dd="${e.id}" title="Удалить запись">${ICONS.trash}</button>`;
  const edit = e.type==='free' ? `<button class="iconbtn diary-del" data-de="${e.id}" title="Редактировать запись" style="right:34px">${ICONS.pencil}</button>` : '';
  const head = `<div class="d-date">${fmtDateRu(e.date || ymd(new Date(e.createdAt)))}</div>`;
  let body = '';
  if(e.type==='day'){
    const marks = {done:'✅', part:'🟠', fail:'❌', cancel:'✖️'};
    const groups = {};
    (e.payload.items||[]).forEach(i=>{ (groups[i.kind] = groups[i.kind]||[]).push(i); });
    body = Object.keys(groups).map(k=>`
      <div class="mt" style="font-size:13px"><b style="font-size:11.5px;letter-spacing:.6px;color:#A395C2">${k}</b>
      ${groups[k].map(i=>`<div>${marks[i.mark]||'▫️'} ${i.time? i.time+' · ':''}${esc(i.name)}</div>`).join('')}</div>`).join('');
    if(e.payload.note) body += `<div class="freetext mt">${linkify(e.payload.note)}</div>`;
  }
  else if(e.type==='goal') body = `<div style="font-weight:800;color:var(--accent-dark)">🏆 ${esc(e.payload.title)}</div>`;
  else if(e.type==='ach'){
    const a = ACHIEVEMENTS.find(x=>x.id===e.payload.achId);
    body = `<div class="flex mt"><span style="width:52px;height:52px;flex-shrink:0">${a?achSVG(a):''}</span><b style="color:var(--accent-dark)">${esc(e.payload.name)}</b></div>`;
  }
  else if(['costume','house','event','travel'].includes(e.type)){
    body = `<div style="font-weight:800;color:var(--accent-dark)">${esc(e.payload.name)}</div>
      ${e.payload.img? `<div class="mt" style="border-radius:10px;overflow:hidden;aspect-ratio:4/3">${imgHTML(e.payload.img,'')}</div>`:''}`;
  }
  else body = `<div class="freetext">${linkify(e.payload.text||'')}</div>`;
  return `<div class="diary-entry">${del}${edit}${head}<div class="phrase">${esc(e.phrase||'')}</div>${body}</div>`;
}
function renderDiaryTab(c){
  const spreads = Math.max(1, Math.ceil(P.diary.length / (DIARY_PER_PAGE*2)));
  DIARY_PAGE = Math.min(DIARY_PAGE, spreads-1);
  const start = DIARY_PAGE * DIARY_PER_PAGE * 2;
  const leftE = P.diary.slice(start, start+DIARY_PER_PAGE);
  const rightE = P.diary.slice(start+DIARY_PER_PAGE, start+DIARY_PER_PAGE*2);
  c.innerHTML = `

        <div>${rightE.map(diaryEntryHTML).join('')}</div>

      <button class="iconbtn" id="dy-next" ${DIARY_PAGE>=spreads-1?'disabled style="opacity:.35"':''}>${ICONS.right}</button>
    </div>`;
  c.querySelector('#dy-prev').onclick = ()=>{ if(DIARY_PAGE>0){ DIARY_PAGE--; render(); } };
  c.querySelector('#dy-next').onclick = ()=>{ if(DIARY_PAGE<spreads-1){ DIARY_PAGE++; render(); } };

    const m = openModal(`<h3 class="mb">Новая запись</h3>

      const text = m.root.querySelector('#dy-text').value.trim();
      if(!text){ toast('Запись пустая'); return; }

      m.close(); render();
    };

  c.querySelectorAll('[data-de]').forEach(b=>b.onclick = ()=>{
    const e = P.diary.find(x=>x.id===b.dataset.de);
    if(!e) return;
    const m = openModal(`<h3 class="mb">Редактировать запись</h3>
      <div class="field"><textarea id="dy-text" maxlength="2000" rows="6">${esc(e.payload.text||'')}</textarea></div>
      <div style="text-align:right"><button class="btn" id="dy-save">Сохранить</button></div>`);
    m.root.querySelector('#dy-save').onclick = ()=>{
      const text = m.root.querySelector('#dy-text').value.trim();
      if(!text){ toast('Запись пустая'); return; }
      e.payload.text = text;
      saveDB(); m.close(); render();
    };
  });
  c.querySelectorAll('[data-dd]').forEach(b=>b.onclick = async ()=>{
    if(!(await confirmModal('Удалить запись из дневника?', 'Да, удалить'))) return;

function leisureImg(kind, id, gi){
  return kind==='events' ? `images/event_${pad2(id)}_${gi||1}.png` : `images/travel_${pad2(id)}_${gi||1}.png`;

/* У мероприятий может быть 1–3 картинки — сколько автор загрузила на GitHub.
   Проверяем наличие event_XX_2.png / event_XX_3.png на лету. */
function probeLeisureImgs(kind, id, cb){
  if(kind==='travels'){ cb([1,2,3]); return; }
  const avail = [1];
  let pending = 2;
  const finish = ()=>{ if(--pending===0) cb(avail.sort((a,b)=>a-b)); };
  [2,3].forEach(n=>{
    const im = new Image();
    im.onload = ()=>{ avail.push(n); finish(); };
    im.onerror = finish;
    im.src = leisureImg(kind, id, n);
  });
}

    <div class="mt flex wrap" style="justify-content:flex-end">
      ${owned? `<button class="btn small ${savedL?'secondary':''}" id="lz-diary" ${savedL?'disabled':''}>${savedL?'В дневнике ✓':'Сохранить в дневник'}</button>
          <span class="status-badge st-done" style="font-size:13.5px;padding:6px 16px">Куплено ✓</span>`
        : `<button class="btn" id="lz-buy" ${P.coins>=ev.price && !needCostume ? '' :
            `disabled data-hint="${esc(needCostume? 'Сначала купи образ «'+costumeName+'»' : 'Не хватает монет — заверши больше дел!')}" data-click="1"`}>
          Купить за ${ev.price} ${ICONS.coin}</button>`}
    </div>`);
  const imgBox = m.root.querySelector('#lz-img');
  const drawImg = ()=>{
    imgBox.querySelectorAll('img,.img-ph').forEach(n=>n.remove());
    imgBox.insertAdjacentHTML('afterbegin', imgHTML(leisureImg(kind, ev.id, gi), ev.name));
    const im = imgBox.querySelector('img,.img-ph');
    if(im){ im.style.width='100%'; im.style.height='100%'; im.style.objectFit='cover'; }
    m.root.querySelectorAll('[data-g]').forEach(d=>d.classList.toggle('on', +d.dataset.g===gi));
  };
  drawImg();
  // листалка появляется только у купленного и только если картинок больше одной
  if(owned) probeLeisureImgs(kind, ev.id, list=>{
    avail = list;
    const dots = m.root.querySelector('#lz-dots');
    if(!dots || avail.length<2) return;
    dots.innerHTML = avail.map(i=>`<span data-g="${i}" class="${i===gi?'on':''}"></span>`).join('');
    m.root.querySelectorAll('[data-g]').forEach(d=>d.onclick = ()=>{ gi = +d.dataset.g; drawImg(); });
  });
  const ld = m.root.querySelector('#lz-diary');
  if(ld && !ld.disabled) ld.onclick = ()=>{
    addDiaryEntry({type:prefix, key:lKey, phrase:kind==='events'? DIARY_PHRASES.event : DIARY_PHRASES.travel,
      date:todayYmd(), payload:{name:ev.name, img:leisureImg(kind, ev.id)}});
    m.close(); openLeisure(kind, id); render();
  };
  const buy = m.root.querySelector('#lz-buy');
  if(buy && !buy.disabled) buy.onclick = async ()=>{
    if(!(await confirmModal(`Купить «${ev.name}» за ${ev.price} монет?`, 'Да, хочу!'))) return;
    addCoins(-ev.price);
    P.purchases[kind].push(ev.id);
    saveDB();
    trackGoal('purchase');
    confetti();
    toast(kind==='events'? 'Чудесное событие впереди! 🎉' : 'Чемоданы собраны! ✈️');
    onbComplete(4);
    checkAchievements();
    m.close();
    openLeisure(kind, id); // сразу показываем купленное во всей красе
    render();
  };
}

/* ================= СТАРТ ================= */
loadDB();
restoreSession();
render();
window.addEventListener('resize', ()=>{ const cv = document.getElementById('confetti-canvas'); if(cv.width) { cv.width = innerWidth; cv.height = innerHeight; } });
</script>
</body>
</html>
